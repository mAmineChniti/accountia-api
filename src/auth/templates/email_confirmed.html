<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Confirmation - Accountia</title>
    <style>
      :root {
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --success: #16a34a;
        --success-bg: #f0fdf4;
        --danger: #dc2626;
        --danger-bg: #fef2f2;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --surface: #ffffff;
        --bg-a: #eff6ff;
        --bg-b: #f8fafc;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 45%),
          radial-gradient(circle at 90% 90%, #bfdbfe 0%, transparent 40%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: 100%;
        max-width: 680px;
      }

      .brand {
        text-align: center;
        margin-bottom: 14px;
        font-weight: 800;
        color: var(--brand);
        font-size: 26px;
        letter-spacing: -0.4px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .top {
        padding: 28px 30px 22px;
        background: linear-gradient(135deg, var(--brand), var(--brand-dark));
        color: #fff;
      }

      .top h1 {
        font-size: 24px;
        letter-spacing: -0.3px;
      }

      .content {
        padding: 28px 30px 22px;
      }

      .status {
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 16px;
        font-size: 15px;
        font-weight: 600;
      }

      .status.success {
        background: var(--success-bg);
        color: var(--success);
        border: 1px solid #bbf7d0;
      }

      .status.error {
        background: var(--danger-bg);
        color: var(--danger);
        border: 1px solid #fecaca;
      }

      p {
        margin-bottom: 12px;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        border-radius: 10px;
        padding: 11px 18px;
        font-weight: 600;
        font-size: 14px;
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-secondary {
        background: #f1f5f9;
        color: #1e293b;
        border: 1px solid var(--border);
      }

      .footer {
        border-top: 1px solid #f1f5f9;
        padding: 14px 30px 18px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }

      @media (max-width: 640px) {
        .top,
        .content,
        .footer {
          padding-left: 18px;
          padding-right: 18px;
        }

        .top h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand">Accountia</div>
      <section class="card" aria-live="polite">
        <header class="top">
          <h1>{{.Title}}</h1>
        </header>

        <div class="content">
          <div class="status {{.StatusClass}}">{{.StatusText}}</div>

          <p>{{.Message}}</p>

          <div class="actions">
            <a class="btn btn-primary" href="{{.PrimaryActionUrl}}"
              >{{.PrimaryActionLabel}}</a
            >
            <a class="btn btn-secondary" href="{{.SecondaryActionUrl}}"
              >{{.SecondaryActionLabel}}</a
            >
          </div>
        </div>

        <footer class="footer">
          <p>&copy; {{.Year}} Accountia. All rights reserved.</p>
        </footer>
      </section>
    </main>
  </body>
</html>
